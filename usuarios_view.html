<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-black m-0 text-gradient">GESTÃO DE USUÁRIOS</h4>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card-premium">
                <h6 class="fw-bold text-primary mb-3"><i class="fas fa-user-plus me-2"></i>CONVIDAR NOVO USUÁRIO</h6>
                <form id="invite-user-form">
                    <div class="mb-3">
                        <label class="info-label-crm mb-1">E-MAIL DO COLABORADOR</label>
                        <input type="email" id="invite-email" class="form-control no-uppercase" required
                            placeholder="email@agile.com">
                    </div>
                    <div class="mb-3">
                        <label class="info-label-crm mb-1">NOME EXIBIÇÃO</label>
                        <input type="text" id="invite-name" class="form-control" required placeholder="NOME DO USUÁRIO">
                    </div>
                    <div class="mb-4">
                        <label class="info-label-crm mb-1">CARGO / ROLE</label>
                        <select id="invite-role" class="form-select">
                            <option value="user">COLABORADOR</option>
                            <option value="admin">ADMINISTRADOR</option>
                        </select>
                    </div>
                    <!-- Nota: No Supabase Free, o convite e criação deve ser feito via Dashboard ou edge functions para evitar auto-registro indesejado. Aqui proveremos um link rápido para o Dashboard se for admin. -->
                    <div class="alert alert-info small mb-3">
                        <i class="fas fa-info-circle me-1"></i> A criação de contas deve ser feita diretamente no
                        <b>Supabase Dashboard</b> (Auth) por motivos de segurança.
                    </div>
                    <a href="https://supabase.com/dashboard/project/bjkmaabneqnpemhudkzy/auth/users" target="_blank"
                        class="btn btn-primary w-100 fw-bold">
                        <i class="fas fa-external-link-alt me-2"></i> GERENCIAR NO SUPABASE
                    </a>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card-premium">
                <h6 class="fw-bold text-dark mb-3"><i class="fas fa-users me-2"></i>LISTA DE ACESSOS ATIVOS</h6>
                <div class="table-responsive">
                    <table class="table-premium">
                        <thead>
                            <tr>
                                <th>IDENTIFICAÇÃO</th>
                                <th>E-MAIL</th>
                                <th>SITUAÇÃO</th>
                            </tr>
                        </thead>
                        <tbody id="users-list-body">
                            <!-- Populated via UsersModule -->
                            <tr class="text-center">
                                <td colspan="3" class="py-5 text-muted">Carregando lista de usuários...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
