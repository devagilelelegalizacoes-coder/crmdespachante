<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agile CRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/crm.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: -2px;
        }

        .login-logo span {
            color: var(--accent);
        }

        .form-control-login {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white !important;
            padding: 0.8rem 1.2rem;
            border-radius: 0.75rem;
        }

        .form-control-login:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.25rem rgba(14, 165, 233, 0.25);
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 0.75rem;
            font-weight: 700;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .text-muted-login {
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="login-card fade-in">
        <div class="login-logo">AGILE<span>CRM</span></div>
        <form id="login-form">
            <div class="mb-3">
                <label class="info-label-crm text-muted-login mb-2">E-MAIL DE ACESSO</label>
                <input type="email" id="login-email" class="form-control form-control-login no-uppercase" required
                    placeholder="seu@email.com">
            </div>
            <div class="mb-4">
                <label class="info-label-crm text-muted-login mb-2">SENHA</label>
                <input type="password" id="login-pass" class="form-control form-control-login no-uppercase" required
                    placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login" id="btn-entrar">ENTRAR NO SISTEMA</button>
        </form>
        <div id="login-error" class="alert alert-danger mt-3 small d-none"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/database.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-entrar');
            const errorDiv = document.getElementById('login-error');

            btn.disabled = true;
            btn.innerText = "AUTENTICANDO...";
            errorDiv.classList.add('d-none');

            try {
                const { data, error } = await Database.client.auth.signInWithPassword({
                    email: email,
                    password: pass
                });

                if (error) throw error;

                // Success
                window.location.href = 'index.html';

            } catch (err) {
                errorDiv.innerText = "ACESSO NEGADO: " + err.message;
                errorDiv.classList.remove('d-none');
                btn.disabled = false;
                btn.innerText = "ENTRAR NO SISTEMA";
            }
        });

        // Check if already logged in
        (async () => {
            const { data: { session } } = await Database.client.auth.getSession();
            if (session) window.location.href = 'index.html';
        })();
    </script>
</body>

</html>
